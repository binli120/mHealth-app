# @author: Bin Lee
# @email: blee@healthcompass.cloud

# Vector — container log collector for HealthCompass MA
# Reads Docker logs from selected HealthCompass containers and ships them to OpenObserve.
#
# Collected sources:
#   healthcompass-app      → Next.js structured logs
#   healthcompass-ollama   → Ollama inference logs
#   healthcompass-proxy    → Traefik access/error logs
#   healthcompass-analysis → MassHealth analysis service (when enabled)

# ── Source: Supabase Prometheus metrics ──────────────────────────────────────
[sources.supabase_metrics]
type     = "prometheus_scrape"
endpoints = ["${SUPABASE_METRICS_URL}"]
scrape_interval_secs = 60

[sources.supabase_metrics.auth]
strategy = "bearer"
token    = "${SUPABASE_SERVICE_ROLE_KEY}"

# ── Transform: tag Supabase metrics with env label ───────────────────────────
[transforms.supabase_tag]
type   = "remap"
inputs = ["supabase_metrics"]
source = '''
.env = "production"
.source = "supabase"
'''

# ── Sink: OpenObserve — Supabase metrics stream ───────────────────────────────
[sinks.openobserve_supabase]
type        = "prometheus_remote_write"
inputs      = ["supabase_tag"]
endpoint    = "${OPENOBSERVE_URL}/api/${OPENOBSERVE_ORG}/${OPENOBSERVE_STREAM_SUPABASE}/prometheus/api/v1/write"

[sinks.openobserve_supabase.auth]
strategy = "basic"
user     = "${OPENOBSERVE_USER}"
password = "${OPENOBSERVE_PASSWORD}"

# ── Source: Docker container logs ────────────────────────────────────────────
[sources.docker_logs]
type = "docker_logs"
docker_host = "unix:///var/run/docker.sock"
# Only collect logs from our named containers
include_containers = [
  "healthcompass-app",
  "healthcompass-ollama",
  "healthcompass-proxy",
  "healthcompass-analysis",
]

# ── Transform: normalize fields ──────────────────────────────────────────────
[transforms.normalize]
type = "remap"
inputs = ["docker_logs"]
source = '''
# Rename container_name → service for consistency with app logs
.service  = .container_name
.env      = "production"

# Try to parse the message as JSON (Next.js structured logs); fall back to raw
parsed, err = parse_json(.message)
if err == null && is_object(parsed) {
  ., err = merge(., parsed)
  if err != null {
    .raw_message = .message
  }
} else {
  .raw_message = .message
}

# Promote safe dashboard labels from nested app context. This keeps OpenObserve
# SQL panels simple and avoids querying nested JSON paths in logs.
if exists(.context) && is_object(.context) {
  if exists(.context.agent) { .agent = .context.agent }
  if exists(.context.counter) { .counter = .context.counter }
  if exists(.context.duration_ms) { .duration_ms = .context.duration_ms }
  if exists(.context.durationMs) { .duration_ms = .context.durationMs }
  if exists(.context.errorCode) { .error_code = .context.errorCode }
  if exists(.context.extractor) { .extractor = .context.extractor }
  if exists(.context.fieldsFound) { .fields_found = .context.fieldsFound }
  if exists(.context.hasMemory) { .has_memory = .context.hasMemory }
  if exists(.context.ip_hash) { .ip_hash = .context.ip_hash }
  if exists(.context.language) { .language = .context.language }
  if exists(.context.messageCount) { .message_count = .context.messageCount }
  if exists(.context.method) { .method = .context.method }
  if exists(.context.metric) { .metric = .context.metric }
  if exists(.context.mode) { .mode = .context.mode }
  if exists(.context.module) { .module = .context.module }
  if exists(.context.ms) { .ms = .context.ms }
  if exists(.context.path) { .path = .context.path }
  if exists(.context.reason) { .reason = .context.reason }
  if exists(.context.role) { .role = .context.role }
  if exists(.context.route) { .route = .context.route }
  if exists(.context.sequence) { .sequence = .context.sequence }
  if exists(.context.session_id) { .session_id = .context.session_id }
  if exists(.context.sessionId) { .session_id = .context.sessionId }
  if exists(.context.status) { .status = .context.status }
  if exists(.context.thresholdMs) { .threshold_ms = .context.thresholdMs }
  if exists(.context.tool) { .tool = .context.tool }
  if exists(.context.type) { .type = .context.type }
  if exists(.context.user_hash) { .user_hash = .context.user_hash }
  if exists(.context.userHash) { .user_hash = .context.userHash }
  if exists(.context.value) { .value = .context.value }
}

# OpenObserve expects _timestamp in microseconds
._timestamp = to_unix_timestamp(now(), unit: "microseconds")
'''

# ── Sink: OpenObserve HTTP ingest ─────────────────────────────────────────────
# Recommended stream name: containers_prod.
[sinks.openobserve]
type            = "http"
inputs          = ["normalize"]
uri             = "${OPENOBSERVE_URL}/api/${OPENOBSERVE_ORG}/${OPENOBSERVE_STREAM_CONTAINERS}/_json"
method          = "post"
compression     = "gzip"

encoding.codec  = "json"

[sinks.openobserve.batch]
max_bytes    = 1_048_576   # 1 MB
timeout_secs = 5

[sinks.openobserve.auth]
strategy = "basic"
user     = "${OPENOBSERVE_USER}"
password = "${OPENOBSERVE_PASSWORD}"

[sinks.openobserve.request]
retry_attempts = 5
