services:
  # ── Traefik reverse proxy (auto-SSL via Let's Encrypt) ───────────────────
  traefik:
    image: traefik:v3
    container_name: healthcompass-proxy
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP  → redirects to HTTPS
      - "443:443"    # HTTPS (TLS termination here)
    command:
      # Docker provider — watch container labels
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Auto-redirect HTTP → HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      # Let's Encrypt ACME (TLS challenge — no port 80 block needed)
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/certs/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      # Optional: Traefik dashboard (remove in production or restrict)
      # - --api.dashboard=true
      # - --api.insecure=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read container labels
      - traefik_certs:/certs                           # persist Let's Encrypt certs
    networks:
      - proxy

  # ── Next.js app ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_MASSHEALTH_FORMS_BASE_URL: ${NEXT_PUBLIC_MASSHEALTH_FORMS_BASE_URL:-}
        NEXT_PUBLIC_MASSHEALTH_ANALYSIS_BASE_URL: ${NEXT_PUBLIC_MASSHEALTH_ANALYSIS_BASE_URL:-}
        NEXT_PUBLIC_OPENOBSERVE_RUM_ENABLED: ${NEXT_PUBLIC_OPENOBSERVE_RUM_ENABLED:-false}
        NEXT_PUBLIC_OPENOBSERVE_RUM_CLIENT_TOKEN: ${NEXT_PUBLIC_OPENOBSERVE_RUM_CLIENT_TOKEN:-}
        NEXT_PUBLIC_OPENOBSERVE_RUM_APPLICATION_ID: ${NEXT_PUBLIC_OPENOBSERVE_RUM_APPLICATION_ID:-healthcompass-web}
        NEXT_PUBLIC_OPENOBSERVE_RUM_SITE: ${NEXT_PUBLIC_OPENOBSERVE_RUM_SITE:-}
        NEXT_PUBLIC_OPENOBSERVE_RUM_SERVICE: ${NEXT_PUBLIC_OPENOBSERVE_RUM_SERVICE:-healthcompass-web}
        NEXT_PUBLIC_OPENOBSERVE_RUM_ENV: ${NEXT_PUBLIC_OPENOBSERVE_RUM_ENV:-production}
        NEXT_PUBLIC_OPENOBSERVE_RUM_VERSION: ${NEXT_PUBLIC_OPENOBSERVE_RUM_VERSION:-}
        NEXT_PUBLIC_OPENOBSERVE_RUM_ORG: ${NEXT_PUBLIC_OPENOBSERVE_RUM_ORG:-default}
        NEXT_PUBLIC_OPENOBSERVE_RUM_INSECURE_HTTP: ${NEXT_PUBLIC_OPENOBSERVE_RUM_INSECURE_HTTP:-false}
        NEXT_PUBLIC_OPENOBSERVE_RUM_API_VERSION: ${NEXT_PUBLIC_OPENOBSERVE_RUM_API_VERSION:-v1}
        NEXT_PUBLIC_OPENOBSERVE_RUM_SESSION_SAMPLE_RATE: ${NEXT_PUBLIC_OPENOBSERVE_RUM_SESSION_SAMPLE_RATE:-100}
        NEXT_PUBLIC_OPENOBSERVE_RUM_REPLAY_SAMPLE_RATE: ${NEXT_PUBLIC_OPENOBSERVE_RUM_REPLAY_SAMPLE_RATE:-0}
        NEXT_PUBLIC_OPENOBSERVE_RUM_SESSION_REPLAY_ENABLED: ${NEXT_PUBLIC_OPENOBSERVE_RUM_SESSION_REPLAY_ENABLED:-false}
        NEXT_PUBLIC_OPENOBSERVE_RUM_PRIVACY_LEVEL: ${NEXT_PUBLIC_OPENOBSERVE_RUM_PRIVACY_LEVEL:-mask-user-input}
    image: healthcompass-ma:latest
    container_name: healthcompass-app
    restart: unless-stopped
    # ✅ No host port binding — Traefik reaches the app via the internal network
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_PROD: ${DATABASE_URL_PROD:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://${DOMAIN}}
      FROM_EMAIL: ${FROM_EMAIL:-}
      OPENOBSERVE_URL: ${OPENOBSERVE_URL:-}
      OPENOBSERVE_USER: ${OPENOBSERVE_USER:-}
      OPENOBSERVE_PASSWORD: ${OPENOBSERVE_PASSWORD:-}
      OPENOBSERVE_ORG: ${OPENOBSERVE_ORG:-default}
      OPENOBSERVE_STREAM: ${OPENOBSERVE_STREAM:-mhealth_app}
      NEXT_PUBLIC_OPENOBSERVE_RUM_SITE: ${NEXT_PUBLIC_OPENOBSERVE_RUM_SITE:-}
      NEXT_PUBLIC_OPENOBSERVE_RUM_INSECURE_HTTP: ${NEXT_PUBLIC_OPENOBSERVE_RUM_INSECURE_HTTP:-false}
      WHISPER_BASE_URL: ${WHISPER_BASE_URL:-http://whisper:9000}
    env_file:
      - .env.production.local
    labels:
      - "traefik.enable=true"
      # Router: HTTPS
      - "traefik.http.routers.app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=le"
      # Tell Traefik which container port to forward to
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      # Pass real client IP + proto to Next.js
      - "traefik.http.middlewares.app-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.app.middlewares=app-headers"
    networks:
      - proxy
      - internal
    depends_on:
      ollama:
        condition: service_started
      whisper:
        condition: service_started

  # ── Whisper ASR (local voice transcription — no data leaves VPS) ─────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-cpu
    container_name: healthcompass-whisper
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-medium}
      ASR_ENGINE: openai_whisper
    volumes:
      - whisper_models:/root/.cache/whisper
    networks:
      - internal

  # ── Ollama (AI chat) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: healthcompass-ollama
    restart: unless-stopped
    # Not exposed to the internet — internal network only
    expose:
      - "11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal

  # ── OpenObserve (log/metrics/RUM backend) ────────────────────────────────
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    restart: unless-stopped
    expose:
      - "5080"
    environment:
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_USER}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_PASSWORD}
      ZO_DATA_DIR: /data
    volumes:
      - openobserve_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openobserve.rule=Host(`observe.${DOMAIN}`)"
      - "traefik.http.routers.openobserve.entrypoints=websecure"
      - "traefik.http.routers.openobserve.tls=true"
      - "traefik.http.routers.openobserve.tls.certresolver=le"
      - "traefik.http.services.openobserve.loadbalancer.server.port=5080"
    networks:
      - proxy
      - internal

  # ── Vector — container log collector → OpenObserve ───────────────────────
  vector:
    image: timberio/vector:0.54.0-alpine
    container_name: healthcompass-vector
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read container logs
      - ./deploy/vector.toml:/etc/vector/vector.toml:ro
    environment:
      OPENOBSERVE_URL: ${OPENOBSERVE_URL}
      OPENOBSERVE_USER: ${OPENOBSERVE_USER}
      OPENOBSERVE_PASSWORD: ${OPENOBSERVE_PASSWORD}
      OPENOBSERVE_ORG: ${OPENOBSERVE_ORG:-default}
      OPENOBSERVE_STREAM_CONTAINERS: ${OPENOBSERVE_STREAM_CONTAINERS:-containers_prod}
    networks:
      - internal
    depends_on:
      - app
      - ollama

  # ── MassHealth Analysis Service (Python / FastAPI) ────────────────────────
  # Disabled by default — activate with: --profile analysis
  #   docker compose --env-file .env.production.local --profile analysis up -d
  # The image must be built separately from the analysis service repo before enabling.
  masshealth-analysis:
    profiles:
      - analysis
    image: healthcompass-analysis:latest
    container_name: healthcompass-analysis
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.analysis.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/analysis`)"
      - "traefik.http.routers.analysis.entrypoints=websecure"
      - "traefik.http.routers.analysis.tls=true"
      - "traefik.http.routers.analysis.tls.certresolver=le"
      - "traefik.http.services.analysis.loadbalancer.server.port=8000"
    networks:
      - proxy
      - internal

  # ── MCP Server (Model Context Protocol — https://healthcompass.cloud/mcp) ──
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    image: healthcompass-mcp:latest
    container_name: healthcompass-mcp
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      BASE_URL: https://${DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      MCP_CLIENT_ID: ${MCP_CLIENT_ID:-}
      MCP_CLIENT_SECRET: ${MCP_CLIENT_SECRET:-}
    labels:
      - "traefik.enable=true"
      # Route /mcp, /oauth, and /.well-known to this container (priority > app catch-all)
      - "traefik.http.routers.mcp.rule=Host(`${DOMAIN}`) && (PathPrefix(`/mcp`) || PathPrefix(`/authorize`) || PathPrefix(`/token`) || PathPrefix(`/.well-known/oauth-authorization-server`))"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls=true"
      - "traefik.http.routers.mcp.tls.certresolver=le"
      - "traefik.http.routers.mcp.priority=100"
      - "traefik.http.services.mcp.loadbalancer.server.port=3001"
    networks:
      - proxy

networks:
  proxy:
    name: proxy          # shared network — Traefik uses this to reach containers
  internal:
    name: healthcompass-internal
    internal: true       # no external internet access for app ↔ ollama traffic

volumes:
  traefik_certs:
  ollama_data:
  openobserve_data:
  whisper_models:
