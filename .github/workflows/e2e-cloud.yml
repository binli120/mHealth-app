name: E2E — Cloud Smoke Tests

on:
  # Run automatically after every successful deploy to production
  workflow_run:
    workflows: ["Deploy to Hostinger VPS"]
    types: [completed]
    branches: [main]
  # Allow manual trigger against any branch/ref
  workflow_dispatch:

concurrency:
  group: e2e-cloud
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E → Hostinger
    # Only run if the deploy succeeded (workflow_run trigger) or manually triggered
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests against cloud
        run: pnpm test:e2e
        env:
          CI: "true"
          E2E_BASE_URL: "https://${{ secrets.DOMAIN }}"
          # Credentials match demo-data.ts defaults — no secrets needed.
          # Accounts must exist in the cloud Supabase project:
          #   demo.e2e@masshealth-test.local / Demo@2026!
          #   reviewer.e2e@masshealth-test.local / Staff@2026!

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cloud-report
          path: e2e/report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cloud-screenshots
          path: test-results/
          retention-days: 7
