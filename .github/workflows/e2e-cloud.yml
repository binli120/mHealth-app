name: E2E — Cloud Smoke Tests

on:
  push:
    branches: [main]
  # Run automatically after every successful deploy to production
  workflow_run:
    workflows: ["Deploy to Hostinger VPS"]
    types: [completed]
    branches: [main]
  # Allow manual trigger against any branch/ref
  workflow_dispatch:

concurrency:
  group: e2e-cloud
  cancel-in-progress: true

jobs:
  changes:
    name: Classify Changed Files
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.push_filter.outputs.app || steps.defaults.outputs.app }}
      e2e: ${{ steps.push_filter.outputs.e2e || steps.defaults.outputs.e2e }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect app vs e2e changes
        if: ${{ github.event_name == 'push' }}
        id: push_filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '**'
              - '!e2e/**'
              - '!playwright.config.ts'
              - '!.github/**'
              - '!README.md'
              - '!TEST_PLAN.md'
              - '!demo/**'
              - '!coverage/**'
            e2e:
              - 'e2e/**'
              - 'playwright.config.ts'
              - '.github/workflows/e2e-cloud.yml'

      - name: Default change set for non-push runs
        if: ${{ github.event_name != 'push' }}
        id: defaults
        run: |
          echo "app=false" >> "$GITHUB_OUTPUT"
          echo "e2e=false" >> "$GITHUB_OUTPUT"

  e2e:
    name: Playwright E2E → Hostinger
    needs: [changes]
    # Run manually, after a successful deploy, or on pushes that only changed e2e files.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || (github.event_name == 'push' && needs.changes.outputs.e2e == 'true' && needs.changes.outputs.app != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests against cloud
        run: pnpm test:e2e
        env:
          CI: "true"
          E2E_BASE_URL: "https://${{ secrets.DOMAIN }}"
          # Credentials match demo-data.ts defaults — no secrets needed.
          # Accounts must exist in the cloud Supabase project:
          #   demo.e2e@masshealth-test.local / Demo@2026!
          #   reviewer.e2e@masshealth-test.local / Staff@2026!

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cloud-report
          path: e2e/report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cloud-screenshots
          path: test-results/
          retention-days: 7
