name: CI — Test Gate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests + coverage ───────────────────────────────────────────────────
  unit:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eligibility regression sweep
        run: pnpm test:eligibility-cases
        env:
          DATABASE_URL:                   "postgresql://mock:mock@localhost/mock"
          NEXT_PUBLIC_SUPABASE_URL:       "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  "mock-anon-key"
          SUPABASE_SERVICE_ROLE_KEY:      "mock-service-key"
          RESEND_API_KEY:                 "mock-resend-key"
          FROM_EMAIL:                     "noreply@mock.com"
          NEXT_PUBLIC_APP_URL:            "http://localhost:3000"

      - name: Run unit tests with coverage
        id: unit_tests
        run: pnpm test:ci
        env:
          # Unit tests are fully mocked — these stubs satisfy any env-guard code.
          DATABASE_URL:                   "postgresql://mock:mock@localhost/mock"
          NEXT_PUBLIC_SUPABASE_URL:       "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  "mock-anon-key"
          SUPABASE_SERVICE_ROLE_KEY:      "mock-service-key"
          RESEND_API_KEY:                 "mock-resend-key"
          FROM_EMAIL:                     "noreply@mock.com"
          NEXT_PUBLIC_APP_URL:            "http://localhost:3000"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.json
          retention-days: 14

      # ── Create GitHub Issues on failure (main branch only) ──────────────────
      - name: Create GitHub Issues for failures
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:       ${{ github.repository }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REF:        ${{ github.ref }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          RESULTS_FILE:      test-results.json
        run: node scripts/create-ci-issues.mjs

  # ── Dependency security audit ───────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # Fails the job on high or critical severity vulnerabilities in prod deps.
        # moderate/low are reported but do not block — address them as part of
        # normal dependency maintenance.
        run: pnpm audit --audit-level high --prod

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  # ── TypeScript type-check ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit
