name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  changes:
    name: Classify Changed Files
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.push_filter.outputs.app || steps.defaults.outputs.app }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect deploy-relevant changes
        if: ${{ github.event_name == 'push' }}
        id: push_filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '**'
              - '!e2e/**'
              - '!playwright.config.ts'
              - '!.github/**'
              - '!README.md'
              - '!TEST_PLAN.md'
              - '!demo/**'
              - '!coverage/**'

      - name: Default change set for manual runs
        if: ${{ github.event_name != 'push' }}
        id: defaults
        run: echo "app=false" >> "$GITHUB_OUTPUT"

  # ── CI gate: all three CI jobs must pass before we deploy ──────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    name: SSH → VPS → docker compose up
    needs: [changes, ci]          # deploy only runs if CI passes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.app == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:        ${{ secrets.VPS_HOST }}
          username:    ${{ secrets.VPS_USER }}
          key:         ${{ secrets.VPS_SSH_KEY }}
          port:        22
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/${{ secrets.REPO_SLUG }}.git"

            # ── 1. Install Docker if missing ──────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "⚙️  Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              echo "✅ Docker installed"
            fi

            # Always ensure daemon is running (covers fresh installs + reboots)
            systemctl enable docker --now || true
            if ! docker info &>/dev/null; then
              echo "▶ Starting Docker daemon..."
              systemctl start docker
              sleep 3
            fi
            echo "✅ Docker $(docker --version)"

            # ── 2. Clone or update repo ───────────────────────────────────
            echo "▶ Deploying to $APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              REMOTE=$(git -C "$APP_DIR" remote get-url origin 2>/dev/null || echo "")
              if [ -z "$REMOTE" ]; then
                echo "⚠️  Broken clone — removing..."
                rm -rf "$APP_DIR"
              fi
            fi

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "⚙️  First deploy — cloning..."
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --all --prune
            git reset --hard origin/main

            # ── 3. Remove stale docker-compose.yaml if present ────────────
            rm -f "$APP_DIR/docker-compose.yaml"
            echo "✅ Repo up to date"

            # ── 4. Write .env.production.local (no heredoc — avoids indent issues)
            echo "⚙️  Writing .env.production.local..."
            ENV_FILE="$APP_DIR/.env.production.local"
            printf '%s\n' \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "DATABASE_URL_PROD=${{ secrets.DATABASE_URL }}" \
              "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
              "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
              "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}" \
              "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              "OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}" \
              "OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}" \
              "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
              "FROM_EMAIL=${{ secrets.FROM_EMAIL }}" \
              "DOMAIN=${{ secrets.DOMAIN }}" \
              "ACME_EMAIL=${{ secrets.ACME_EMAIL }}" \
              "NEXT_PUBLIC_APP_URL=https://${{ secrets.DOMAIN }}" \
              "MCP_SECRET=${{ secrets.MCP_SECRET }}" \
              > "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            echo "✅ .env.production.local written ($(wc -l < "$ENV_FILE") lines)"

            # ── 5. Build and start containers ─────────────────────────────
            cd "$APP_DIR"
            # --env-file makes compose variables (${DOMAIN}, ${ACME_EMAIL} etc.)
            # available for label/build-arg interpolation in the compose file itself.
            # env_file: in the compose YAML is container-only; this is different.
            docker compose --env-file "$ENV_FILE" up -d --build --remove-orphans

            # ── 6. Health check (inside container — port 3000 is not bound to host) ──
            echo "⏳ Waiting for app (up to 2 min)..."
            for i in $(seq 1 24); do
              if docker exec healthcompass-app node -e "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" > /dev/null 2>&1; then
                echo "✅ App is up after $((i * 5))s"
                break
              fi
              echo "  attempt $i/24..."
              if [ "$i" = "24" ]; then
                echo "❌ App did not start — last 80 log lines:" >&2
                docker compose --env-file "$ENV_FILE" logs --tail=80 app
                exit 1
              fi
              sleep 5
            done

            # ── 7. Cleanup ────────────────────────────────────────────────
            docker image prune -f
            echo "🚀 Deploy complete"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deploy to ${{ secrets.VPS_HOST }} failed — check logs above"
